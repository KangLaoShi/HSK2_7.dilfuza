            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev + 1) % vocabulary.length);
                }, 150);
            };

            const prevCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev - 1 + vocabulary.length) % vocabulary.length);
                }, 150);
            };

            const currentWord = vocabulary[currentIndex];

            return (
                <div className="flex flex-col items-center justify-center animate-fadeIn">
                    <div className="text-center mb-6">
                        <h2 className="text-2xl font-bold text-slate-700">Yangi so'zlar (生词)</h2>
                        <p className="text-slate-500">Kartochkani o'girish uchun ustiga bosing (点击卡片翻转)</p>
                    </div>

                    <div 
                        className="relative w-full max-w-sm h-80 perspective-1000 cursor-pointer mb-8"
                        onClick={() => setIsFlipped(!isFlipped)}
                    >
                        <div className={`w-full h-full transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                            
                            {/* Front of Card (Chinese) */}
                            <div className="absolute inset-0 backface-hidden bg-white border-2 border-slate-100 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-center bg-gradient-to-br from-white to-slate-50">
                                <button 
                                    onClick={(e) => { e.stopPropagation(); playAudio(currentWord.ch); }}
                                    className="absolute top-4 right-4 p-3 bg-slate-100 text-teal-600 rounded-full hover:bg-teal-200 transition-colors shadow-sm"
                                    title="播放发音 (Play audio)"
                                >
                                    <Volume2 size={24} />
                                </button>

                                <span className="text-8xl font-black text-slate-800 mb-4">{currentWord.ch}</span>
                                <div className="absolute bottom-6 text-slate-400 flex items-center gap-2">
                                    <RotateCcw size={16} /> O'girish
                                </div>
                            </div>

                            {/* Back of Card (Pinyin + Uzbek) */}
                            <div className="absolute inset-0 backface-hidden rotate-y-180 bg-teal-600 text-white rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-center">
                                <span className="text-4xl font-medium mb-4 tracking-wide">{currentWord.py}</span>
                                <span className="text-2xl font-bold">{currentWord.uz}</span>
                                <div className="absolute top-6 right-6 opacity-30">
                                    <BookOpen size={48} />
                                </div>
                            </div>

                        </div>
                    </div>

                    <div className="flex items-center gap-6">
                        <button onClick={prevCard} className="p-4 bg-white rounded-full shadow hover:bg-slate-100 transition-colors text-slate-600">
                            <ChevronLeft size={28} />
                        </button>
                        <span className="font-semibold text-lg text-slate-500">
                            {currentIndex + 1} / {vocabulary.length}
                        </span>
                        <button onClick={nextCard} className="p-4 bg-white rounded-full shadow hover:bg-slate-100 transition-colors text-slate-600">
                            <ChevronRight size={28} />
                        </button>
                    </div>
                </div>
            );
        }

        /* =========================================
           DIALOGUES COMPONENT
           ========================================= */
        function DialoguesSection() {
            return (
                <div className="space-y-8 animate-fadeIn">
                    <div className="text-center mb-8">
                        <h2 className="text-2xl font-bold text-slate-700">Matnlar (课文)</h2>
                        <p className="text-slate-500">Dialoglarni o'qing va o'rganing (附带发音和多语种翻译)</p>
                    </div>

                    {dialogues.map((dialogue, index) => (
                        <div key={index} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="bg-teal-600 text-white px-6 py-3 font-bold text-lg flex items-center gap-3">
                                <MessageCircle size={22} />
                                {dialogue.title}
                            </div>
                            <div className="p-6 space-y-4">
                                {dialogue.lines.map((line, lIndex) => (
                                    <div key={lIndex} className={`flex gap-4 p-4 rounded-xl ${line.speaker === 'A' ? 'bg-slate-50' : 'bg-teal-50'}`}>
                                        <div className={`font-bold text-xl h-10 w-10 shrink-0 flex items-center justify-center rounded-full ${line.speaker === 'A' ? 'bg-slate-200 text-slate-600' : 'bg-teal-200 text-teal-700'}`}>
                                            {line.speaker}
                                        </div>
                                        <div className="flex-1">
                                            <div className="flex items-center gap-3 mb-1">
                                                <p className="text-xl font-bold text-slate-800">{line.ch}</p>
                                                <button 
                                                    onClick={() => playAudio(line.ch)} 
                                                    className="p-1.5 text-teal-600 bg-teal-100/50 rounded-full hover:bg-teal-200 transition-colors"
                                                    title="播放发音"
                                                >
                                                    <Volume2 size={18} />
                                                </button>
                                            </div>
                                            <p className="text-md text-slate-500 mb-3 font-medium">{line.py}</p>
                                            
                                            <div className="space-y-1 border-l-2 border-teal-200 pl-3">
                                                <p className="text-sm text-slate-600 flex items-start gap-2">
                                                    <span className="font-bold text-teal-700/60 w-6">UZ</span> <span className="text-teal-900">{line.uz}</span>
                                                </p>
                                                <p className="text-sm text-slate-600 flex items-start gap-2">
                                                    <span className="font-bold text-sky-700/60 w-6">RU</span> <span className="text-sky-900">{line.ru}</span>
                                                </p>
                                                <p className="text-sm text-slate-600 flex items-start gap-2">
                                                    <span className="font-bold text-rose-700/60 w-6">EN</span> <span className="text-rose-900">{line.en}</span>
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        /* =========================================
           GRAMMAR COMPONENT
           ========================================= */
        function GrammarSection() {
            return (
                <div className="space-y-6 animate-fadeIn">
                    <div className="text-center mb-8">
                        <h2 className="text-2xl font-bold text-slate-700">Grammatika (语法)</h2>
                        <p className="text-slate-500">Qoidalarni o'rganing va misollarni ko'rib chiqing (多语种语法解析)</p>
                    </div>

                    {grammar.map((item, index) => (
                        <div key={index} className="bg-white rounded-2xl shadow-sm border-l-8 border-teal-500 p-6 hover:shadow-md transition-shadow">
                            <h3 className="text-xl font-bold text-slate-800 mb-4">{item.title}</h3>
                            
                            <div className="bg-slate-50 p-4 rounded-xl space-y-2 mb-5">
                                <p className="text-sm text-teal-900 flex gap-2 leading-relaxed"><span className="font-bold text-teal-600/70 w-6 shrink-0">UZ</span> {item.explanations.uz}</p>
                                <p className="text-sm text-sky-900 flex gap-2 leading-relaxed"><span className="font-bold text-sky-600/70 w-6 shrink-0">RU</span> {item.explanations.ru}</p>
                                <p className="text-sm text-rose-900 flex gap-2 leading-relaxed"><span className="font-bold text-rose-600/70 w-6 shrink-0">EN</span> {item.explanations.en}</p>
                            </div>

                            <div className="space-y-3">
                                <h4 className="font-semibold text-teal-700 mb-3 flex items-center gap-2">
                                    Misollar (例如):
                                </h4>
                                <div className="space-y-4">
                                    {item.examples.map((ex, eIndex) => (
                                        <div key={eIndex} className="pl-4 border-l-2 border-slate-200 space-y-1">
                                            <p className="text-slate-800 font-bold flex items-center gap-2">
                                                {ex.ch}
                                                <button onClick={() => playAudio(ex.ch)} className="text-slate-400 hover:text-teal-500 transition-colors">
                                                    <Volume2 size={16} />
                                                </button>
                                            </p>
                                            <p className="text-sm text-slate-500 flex gap-2"><span className="font-semibold text-slate-300 w-6">UZ</span> {ex.uz}</p>
                                            <p className="text-sm text-slate-500 flex gap-2"><span className="font-semibold text-slate-300 w-6">RU</span> {ex.ru}</p>
                                            <p className="text-sm text-slate-500 flex gap-2"><span className="font-semibold text-slate-300 w-6">EN</span> {ex.en}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        /* =========================================
           QUIZ COMPONENT
           ========================================= */
        function QuizSection() {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [showResults, setShowResults] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);

            const handleAnswerClick = (optionIndex) => {
                if (selectedAnswer !== null) return; 

                setSelectedAnswer(optionIndex);

                const isCorrect = optionIndex === quizQuestions[currentQIndex].answer;
                if (isCorrect) {
                    setScore(score + 1);
                }

                setTimeout(() => {
                    if (currentQIndex + 1 < quizQuestions.length) {
                        setCurrentQIndex(currentQIndex + 1);
                        setSelectedAnswer(null);
                    } else {
                        setShowResults(true);
                    }
                }, 1500); // 增加了一点等待时间，方便学生看清错误解析或长答案
            };

            const restartQuiz = () => {
                setCurrentQIndex(0);
                setScore(0);
                setShowResults(false);
                setSelectedAnswer(null);
            };

            if (showResults) {
                const percentage = Math.round((score / quizQuestions.length) * 100);
                let feedbackUz = "";
                let feedbackZh = "";
                
                if (percentage === 100) {
                    feedbackUz = "Ajoyib! Siz hamma narsani mukammal bilasiz! 🏆";
                    feedbackZh = "太棒了！你的汉语非常完美！";
                } else if (percentage >= 80) {
                    feedbackUz = "Juda yaxshi! Kichik xatolar bor, lekin natija zo'r. 👏";
                    feedbackZh = "非常好！有几个小错误，但是成绩很棒！";
                } else if (percentage >= 50) {
                    feedbackUz = "Yomon emas, lekin darslikni yana bir bor takrorlashingiz kerak. 📚";
                    feedbackZh = "还不错，但是你需要再复习一下语法。";
                } else {
                    feedbackUz = "Ko'proq amaliyot kerak. Lug'at va grammatikani qaytadan o'qing! 💪";
                    feedbackZh = "需要更多练习，请重新认真复习！";
                }

                return (
                    <div className="bg-white rounded-3xl shadow-lg p-10 text-center max-w-lg mx-auto animate-fadeIn border border-slate-100">
                        <Award className="mx-auto text-teal-500 mb-6" size={80} />
                        <h2 className="text-3xl font-bold text-slate-800 mb-2">Test Yakunlandi!</h2>
                        <h3 className="text-xl font-medium text-slate-500 mb-6">测试完成！</h3>
                        <p className="text-6xl font-black text-teal-600 mb-6">{score} <span className="text-3xl text-slate-400">/ {quizQuestions.length}</span></p>
                        <div className="mb-8">
                            <p className="text-lg text-slate-700 font-bold mb-1">{feedbackUz}</p>
                            <p className="text-md text-slate-500">{feedbackZh}</p>
                        </div>
                        <button 
                            onClick={restartQuiz}
                            className="bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-colors flex items-center gap-2 mx-auto"
                        >
                            <RotateCcw size={20} /> Qaytadan boshlash (重新开始)
                        </button>
                    </div>
                );
            }

            const currentQ = quizQuestions[currentQIndex];

            return (
                <div className="max-w-3xl mx-auto animate-fadeIn">
                    <div className="flex justify-between items-center mb-6 text-slate-500 font-semibold">
                        <span>Savol (问题) {currentQIndex + 1} / {quizQuestions.length}</span>
                        <span>Natija (得分): {score}</span>
                    </div>

                    <div className="w-full bg-slate-200 rounded-full h-2 mb-8">
                        <div 
                            className="bg-teal-500 h-2 rounded-full transition-all duration-300" 
                            style={{ width: `${((currentQIndex) / quizQuestions.length) * 100}%` }}
                        ></div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mb-6">
                        <h3 className="text-2xl font-bold text-slate-800 mb-8 leading-relaxed">{currentQ.q}</h3>
                        
                        <div className="space-y-3">
                            {currentQ.options.map((option, index) => {
                                let btnClass = "w-full text-left p-5 rounded-xl border-2 transition-all font-medium text-lg flex items-center justify-between ";
                                
                                if (selectedAnswer === null) {
                                    btnClass += "border-slate-100 bg-slate-50 hover:border-teal-400 hover:bg-teal-50 text-slate-700";
                                } else if (index === currentQ.answer) {
                                    btnClass += "border-green-500 bg-green-50 text-green-700";
                                } else if (selectedAnswer === index) {
                                    btnClass += "border-red-500 bg-red-50 text-red-700";
                                } else {
                                    btnClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-50";
                                }

                                return (
                                    <button 
                                        key={index} 
                                        onClick={() => handleAnswerClick(index)}
                                        disabled={selectedAnswer !== null}
                                        className={btnClass}
                                    >
                                        <span className="leading-relaxed pr-4">{option}</span>
                                        {selectedAnswer !== null && index === currentQ.answer && <CheckCircle size={24} className="text-green-500 shrink-0" />}
                                        {selectedAnswer === index && index !== currentQ.answer && <XCircle size={24} className="text-red-500 shrink-0" />}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        /* =========================================
           MAIN APP
           ========================================= */
        function App() {
            const [activeTab, setActiveTab] = useState('flashcards');

            const tabs = [
                { id: 'flashcards', icon: BookOpen, label: "Lug'at (生词)" },
                { id: 'dialogues', icon: MessageCircle, label: "Matnlar (对话)" },
                { id: 'grammar', icon: BookType, label: "Grammatika (语法)" },
                { id: 'quiz', icon: HelpCircle, label: "Test (测试)" },
            ];

            return (
                <div className="flex-grow flex flex-col">
                    {/* HEADER */}
                    <header className="bg-gradient-to-r from-teal-600 to-emerald-600 text-white p-6 shadow-md text-center">
                        <h1 className="text-3xl font-bold mb-2">第7课：你家离公司远吗</h1>
                        <p className="text-lg font-medium opacity-90 tracking-wide bg-emerald-800/30 inline-block px-4 py-1 rounded-full">
                            Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                        </p>
                    </header>

                    {/* NAVIGATION TABS */}
                    <nav className="flex justify-center flex-wrap bg-white shadow-sm sticky top-0 z-10">
                        {tabs.map(tab => {
                            const IconCmp = tab.icon;
                            return (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-6 py-4 font-semibold transition-colors duration-200 border-b-4 ${
                                        activeTab === tab.id 
                                            ? 'border-teal-500 text-teal-700 bg-teal-50/50' 
                                            : 'border-transparent text-slate-500 hover:text-teal-600 hover:bg-slate-50'
                                    }`}
                                >
                                    <IconCmp size={20} />
                                    {tab.label}
                                </button>
                            );
                        })}
                    </nav>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-grow container mx-auto px-4 py-8 max-w-4xl">
                        {activeTab === 'flashcards' && <FlashcardsSection />}
                        {activeTab === 'dialogues' && <DialoguesSection />}
                        {activeTab === 'grammar' && <GrammarSection />}
                        {activeTab === 'quiz' && <QuizSection />}
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-slate-800 text-slate-300 py-8 text-center mt-auto border-t-4 border-teal-600">
                        <div className="container mx-auto px-4">
                            <p className="font-semibold mb-1">HSK 2 Standard Course - Lesson 7</p>
                            <p className="text-sm">© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
